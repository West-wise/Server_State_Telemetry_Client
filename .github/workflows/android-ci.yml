name: Android CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. 레포지토리 체크아웃 (소스 코드 가져오기)
      - name: Checkout Source Code
        uses: actions/checkout@v4

      # 2. JDK 17 설정 (안드로이드 빌드 툴 호환성을 위해 JDK 17 지정)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 3. Gradle 캐싱 및 설정 자동화 (빌드 성능 향상을 위한 캐시 활용)
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      # 4. gradlew 실행 권한 부여
      - name: Grant Execute Permission for Gradlew
        run: chmod +x gradlew

      # 5. 단위 테스트 및 디버그 빌드 수행 (보안 서명이 필요 없는 디버그 빌드로 안전한 테스트 수행)
      - name: Run Build and Tests
        run: ./gradlew testDebugUnitTest assembleDebug
